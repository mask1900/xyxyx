plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

// AstroFelyx'in yayinda olan surumunu imzalamis oldugun keystore ile
// aynisi kullanilmali (Play Store, guncellemelerde imza uyusmasi arar).
// key.properties dosyasini BU PROJEYE KENDIN eklemen gerekiyor (bu dosya
// ve icindeki sifreler/keystore repo'ya/paylasima dahil edilmemeli).
// Ornek icerik icin android/key.properties.example dosyasina bak.
def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
def hasKeystoreProperties = keystorePropertiesFile.exists()
if (hasKeystoreProperties) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.astrofelyx.pro"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        // Bolum/proje kimligi. FlutLab veya "flutter run" bunu degistirmenize
        // gerek kalmadan kullanabilir.
        applicationId "com.astrofelyx.pro"
        minSdk 21
        targetSdk flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        if (hasKeystoreProperties) {
            release {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile keystoreProperties['storeFile'] ? rootProject.file(keystoreProperties['storeFile']) : null
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            // key.properties eklendiyse GERCEK (AstroFelyx'i yayinladigin)
            // keystore ile imzalar. Eklenmediyse HIC IMZALAMAZ (null) —
            // boylece CI'da (GitHub Actions) uretilen .apk/.aab, cmd
            // uzerinden jarsigner/apksigner ile SENIN imzalayabilecegin
            // gercekten imzasiz bir dosya olur. (Debug imzasiyla derlenip
            // sonradan cmd'den yeniden imzalanamaz, o yuzden debug fallback
            // KALDIRILDI.)
            signingConfig hasKeystoreProperties ? signingConfigs.release : null
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // Play Games'e giris ve "Saved Games" (bulut kaydi) icin. bkz.
    // MainActivity.kt ve README_PLAY_GAMES.md.
    implementation "com.google.android.gms:play-services-games-v2:20.1.2"
}
