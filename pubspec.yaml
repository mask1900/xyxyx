name: space_sort_game
description: "Uzay temali bir top/renk siralama (sort) bulmacasi. Gezegen gorselleri projeye gomulu (bundled) asset'tir; tup/kapak/izgara gibi diger tum arayuz ogeleri CustomPainter ile vektorel cizilir. Hicbir network/link istegi yapilmaz."
publish_to: 'none'
version: 1.3.0+102

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # Oyuncu ilerlemesini (xp, yildiz, banka haklari, gunluk seri vb.)
  # cihazda kalici olarak saklamak icin.
  shared_preferences: ^2.2.2
  # Kod icinde sentezlenen (link/dosya gerektirmeyen) kisa ses efektlerini
  # calmak icin. Ses baytlari runtime'da uretilir, hicbir sarki/ses dosyasi
  # veya internet erisimi gerekmez.
  audioplayers: ^6.1.0
  # Gunluk sonuc karti (skor gorseli) uygulama disina (WhatsApp/Instagram/
  # vb.) paylasilirken sistemin yerlesik "paylas" sayfasini acmak icin.
  share_plus: ^10.1.2
  # Paylasilacak sonuc kartinin PNG olarak yazilacagi gecici dosya yolunu
  # bulmak icin (share_plus'in dosya paylasabilmesi icin gerekli).
  path_provider: ^2.1.4
  # Yandex Mobile Ads (odullu/rewarded reklamlar). AdService su an DEMO
  # reklam birimi ID'sini kullaniyor ('demo-rewarded-yandex') — yayina
  # almadan once lib/services/ad_service.dart icindeki rewardedAdUnitId
  # sabitini gercek ID ile degistir.
  yandex_mobileads: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # Gezegen gorselleri (assets/planets/) kullaniciyla birlikte hazirlanan,
  # projeye GOMULU (bundled) PNG dosyalaridir — calisma zamaninda hicbir
  # network/link istegi yapilmaz. Tup/kapak/izgara gibi diger tum arayuz
  # ogeleri hala dogrudan Dart kodu icinde CustomPainter ile vektorel
  # olarak ciziliyor.
  assets:
    - assets/planets/
